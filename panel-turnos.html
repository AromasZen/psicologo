<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Turno | Lic. Martín Rossi</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS (Reusing existing styles and variables) -->
    <link rel="stylesheet" href="style.css">

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color, #f4f7f6);
        }

        .confirmation-container {
            max-width: 500px;
            width: 90%;
            text-align: center;
            padding: 40px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(44, 82, 130, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .status-icon.loading {
            color: var(--primary, #2C5282);
            animation: spin 2s linear infinite;
        }

        .status-icon.success {
            color: #38a169;
        }

        .status-icon.error {
            color: #e53e3e;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            color: var(--text-dark, #2d3748);
            margin-bottom: 15px;
            font-family: 'Outfit', sans-serif;
        }

        p {
            color: var(--text-light, #4a5568);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .details-box {
            background-color: rgba(44, 82, 130, 0.05);
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-bottom: 25px;
        }

        .details-box p {
            margin: 8px 0;
            color: var(--text-dark, #2d3748);
        }

        .details-box strong {
            color: var(--primary, #2C5282);
        }

        .btn-home {
            display: inline-block;
            background-color: var(--primary, #2C5282);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: var(--secondary, #1A365D);
            transform: translateY(-2px);
            color: white;
        }

        /* Blobs backround - similar to index.html */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(44, 82, 130, 0.3);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(44, 82, 130, 0.2);
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>

<body>
    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="confirmation-container" id="main-container">
        <i class="fas fa-spinner status-icon loading" id="status-icon"></i>
        <h1 id="status-title">Procesando...</h1>
        <p id="status-message">Estamos verificando tu turno. Por favor, esperá unos segundos.</p>

        <div class="details-box" id="details-box" style="display: none;">
            <p><strong>📅 Fecha:</strong> <span id="res-fecha"></span></p>
            <p><strong>⏰ Hora:</strong> <span id="res-hora"></span></p>
            <p><strong>🧠 Servicio:</strong> <span id="res-servicio"></span></p>
            <p><strong>📍 Modalidad:</strong> <span id="res-modalidad"></span></p>
        </div>

        <a href="index.html" class="btn-home" style="display: none;" id="btn-home">Volver al inicio</a>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://nkkyyqqqusodhwqvprik.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ra3l5cXFxdXNvZGh3cXZwcmlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjU1MDIsImV4cCI6MjA4ODYwMTUwMn0.Gs5bdRrv9HNViruVjr8mQl4Oh2Ei1Hyryr0vxpdPPhU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function procesarConfirmacion() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const message = document.getElementById('status-message');
            const detailsBox = document.getElementById('details-box');
            const btnHome = document.getElementById('btn-home');

            if (!token) {
                mostrarError('Link inválido', 'No se encontró el token de confirmación en la URL.');
                return;
            }

            try {
                // Hacemos el UPDATE
                const { data: updateData, error: updateError } = await db
                    .from('aareservas')
                    .update({ estado: 'Confirmado' })
                    .eq('confirmation_token', token)
                    .eq('estado', 'Pendiente')
                    .select();

                if (updateError) throw updateError;

                if (!updateData || updateData.length === 0) {
                    mostrarError('Link inválido o expirado', 'Este turno ya fue procesado o el link no es válido.');
                    return;
                }

                const turno = updateData[0];

                // Mostrar éxito
                icon.className = 'fas fa-check-circle status-icon success';
                title.textContent = '¡Turno confirmado!';
                message.textContent = '✅ Tu turno ha sido confirmado exitosamente. Nos vemos pronto.';

                document.getElementById('res-fecha').textContent = turno.fecha_reserva;
                document.getElementById('res-hora').textContent = turno.hora_reserva;
                document.getElementById('res-servicio').textContent = turno.servicio;
                document.getElementById('res-modalidad').textContent = turno.modalidad;

                detailsBox.style.display = 'block';
                btnHome.style.display = 'inline-block';

            } catch (err) {
                console.error('Error al confirmar:', err);
                mostrarError('Error del servidor', 'Ocurrió un error al procesar la confirmación. Por favor, intentá nuevamente más tarde.');
            }
        }

        function mostrarError(titulo, descripcion) {
            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const message = document.getElementById('status-message');
            const btnHome = document.getElementById('btn-home');

            icon.className = 'fas fa-times-circle status-icon error';
            title.textContent = titulo;
            message.textContent = descripcion;
            btnHome.style.display = 'inline-block';
        }

        // Iniciar proceso cuando cargue la página
        document.addEventListener('DOMContentLoaded', procesarConfirmacion);
    </script>
</body>

</html>
